<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Navigation — Port de Montréal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #080c10;
      --surface: #0d1117;
      --border:  #1c2433;
      --accent:  #3b82f6;
      --accent2: #06b6d4;
      --text:    #e2e8f0;
      --muted:   #4b5e72;
      --ok:      #22c55e;
      --warn:    #f59e0b;
      --err:     #ef4444;
      --mono:    'DM Mono', monospace;
      --sans:    'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .header-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .header-title span { color: var(--accent2); }

    #btn-refresh {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 7px 14px;
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-refresh:hover  { border-color: var(--accent); color: var(--accent); }
    #btn-refresh:active { opacity: 0.7; }
    #btn-refresh.loading .icon-refresh { animation: spin 0.8s linear infinite; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    main {
      padding: 4px 20px 24px;
      display: flex;
      flex-direction: column;
      max-width: 600px;
      margin: 0 auto;
    }

    .section-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 18px 0 8px;
    }

    .cards-group { display: flex; flex-direction: column; gap: 12px; }

    .station-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.35s ease forwards;
    }
    .station-card:nth-child(1){animation-delay:0.04s}
    .station-card:nth-child(2){animation-delay:0.09s}
    .station-card:nth-child(3){animation-delay:0.14s}
    @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }

    .station-header {
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .station-name { font-size: 13px; font-weight: 500; }
    .station-meta { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 3px; }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
    }
    .status-dot.ok   { background: var(--ok);  box-shadow: 0 0 6px var(--ok); }
    .status-dot.err  { background: var(--err); box-shadow: 0 0 6px var(--err); }
    .status-dot.load { background: var(--warn); animation: blink 1s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }

    .data-cell {
      background: var(--surface);
      padding: 13px 16px 11px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cell-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .cell-value {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .cell-value .unit { font-size: 12px; color: var(--muted); margin-left: 2px; font-weight: 400; }
    .cell-value.blue  { color: var(--accent2); }
    .cell-value.warm  { color: #fb923c; }
    .cell-value.red   { color: var(--err); }
    .cell-value.na    { color: var(--muted); font-size: 14px; padding-top: 4px; }
    .cell-time { font-family: var(--mono); font-size: 9px; color: var(--muted); }

    .forecast-body { padding: 14px 16px; }
    .forecast-period {
      font-family: var(--mono); font-size: 9px;
      color: var(--muted); letter-spacing: 0.1em; margin-bottom: 10px;
    }
    .forecast-temps { display: flex; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
    .forecast-text {
      font-family: var(--sans); font-size: 12px; color: #94a3b8;
      line-height: 1.65; border-top: 1px solid var(--border); padding-top: 10px;
    }

    .skeleton {
      height: 26px; width: 85px; border-radius: 4px;
      background: linear-gradient(90deg,var(--border) 25%,#1e2d3d 50%,var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .error-msg { font-family: var(--mono); font-size: 11px; color: var(--err); padding: 14px 16px; }

    footer {
      padding: 14px 20px;
      font-family: var(--mono); font-size: 9px; color: var(--muted);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      max-width: 600px; margin: 0 auto;
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">PORT MTL — <span>Navigation</span></div>
  <button id="btn-refresh" onclick="rafraichirTout()">
    <svg class="icon-refresh" width="12" height="12" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6M3 22v-6h6"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L21 8M3 16l2.64 2.36A9 9 0 0 0 20.49 15"/>
    </svg>
    ACTUALISER
  </button>
</header>

<main>
  <div class="section-title">Fleuve Saint-Laurent — IWLS</div>
  <div class="cards-group" id="group-iwls"></div>

  <div class="section-title">Météo — McTavish (WTA)</div>
  <div class="cards-group" id="group-meteo"></div>

  <div class="section-title">Prévisions — Montréal</div>
  <div class="cards-group" id="group-prev"></div>
</main>

<footer>
  <span>IWLS · Environnement Canada</span>
  <span id="last-update">—</span>
</footer>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG IWLS
// ══════════════════════════════════════════════════════
const STATIONS_CONFIG = [
  {
    alternativeName: 'Montreal jetee #1',
    displayName:     'Montréal — Jetée #1',
    series: ['wlo', 'wt1'],
  },
  // Ajouter d'autres stations IWLS ici :
  // { alternativeName: 'Quebec', displayName: 'Québec', series: ['wlo', 'wt1'] },
];

const IWLS_BASE   = 'https://api.iwls-sine.azure.cloud-nuage.dfo-mpo.gc.ca';
const SERIES_META = {
  wlo: { label: 'Niveau observé',  unit: 'm',  cls: 'blue' },
  wlp: { label: 'Niveau prédit',   unit: 'm',  cls: 'blue' },
  wt:  { label: 'Température eau', unit: '°C', cls: 'warm' },
  wt1: { label: 'Température eau', unit: '°C', cls: 'warm' },
};

// ══════════════════════════════════════════════════════
//  CONFIG MÉTÉO EC
// ══════════════════════════════════════════════════════
// Observations temps réel — station McTavish (WTA), la plus proche du port
const EC_OBS_URL = 'https://api.weather.gc.ca/collections/swob-realtime/items'
                 + '?lang=fr&limit=1&sortby=-date_tm-value&tc_id-value=WTA&f=json';

// Prévisions — Montréal (citypage-weather)
const EC_PREV_URL = 'https://api.weather.gc.ca/collections/citypage-weather/items'
                  + '?lang=fr&limit=8&location-name=Montreal&f=json';

// ══════════════════════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════════════════════
let stationIds = {};
let isLoading  = false;

// ══════════════════════════════════════════════════════
//  UTILITAIRES
// ══════════════════════════════════════════════════════
function degToCardinal(deg) {
  if (deg == null) return '—';
  const d = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
             'S','SSO','SO','OSO','O','ONO','NO','NNO'];
  return d[Math.round(deg / 22.5) % 16];
}

function fmt(isoStr) {
  if (!isoStr) return '—';
  return new Date(isoStr).toLocaleTimeString('fr-CA',
    { hour: '2-digit', minute: '2-digit' });
}

function cellHTML(label, val, unit, cls, temps) {
  if (val == null)
    return `<div class="cell-label">${label}</div>
            <div class="cell-value na">N/D</div>
            <div class="cell-time">—</div>`;
  return `<div class="cell-label">${label}</div>
          <div class="cell-value ${cls||''}">${val}<span class="unit">${unit||''}</span></div>
          <div class="cell-time">${temps||'—'}</div>`;
}

function skeletonCell(label) {
  return `<div class="data-cell">
            <div class="cell-label">${label}</div>
            <div class="skeleton"></div>
            <div class="cell-time">—</div>
          </div>`;
}

// ══════════════════════════════════════════════════════
//  IWLS — Fetch
// ══════════════════════════════════════════════════════
async function chargerIndexIWLS() {
  const r = await fetch(`${IWLS_BASE}/api/v1/stations`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  for (const s of await r.json())
    if (s.alternativeName) stationIds[s.alternativeName] = s.id;
}

async function fetchIWLS(sid, code) {
  const now  = new Date();
  const to   = encodeURIComponent(now.toISOString().replace(/\.\d+Z$/, 'Z'));
  const from = encodeURIComponent(new Date(now-3600000).toISOString().replace(/\.\d+Z$/, 'Z'));
  const r = await fetch(`${IWLS_BASE}/api/v1/stations/${sid}/data`
    + `?time-series-code=${code}&from=${from}&to=${to}&resolution=ONE_MINUTE`);
  if (!r.ok) return null;
  const d = await r.json();
  return d?.length > 0 ? d[0] : null;
}

// ══════════════════════════════════════════════════════
//  IWLS — Rendu
// ══════════════════════════════════════════════════════
function cid(cfg) { return 'card-' + cfg.alternativeName.replace(/\s+/g, '-'); }

function creerCarteIWLS(cfg) {
  const id = cid(cfg);
  const el = document.createElement('div');
  el.className = 'station-card'; el.id = id;
  el.innerHTML = `
    <div class="station-header">
      <div>
        <div class="station-name">${cfg.displayName}</div>
        <div class="station-meta" id="meta-${id}">—</div>
      </div>
      <div class="status-dot load" id="dot-${id}"></div>
    </div>
    <div class="data-grid" id="grid-${id}">
      ${cfg.series.map(c => skeletonCell((SERIES_META[c]||{label:c}).label)).join('')}
    </div>`;
  return el;
}

async function chargerIWLS(cfg) {
  const id  = cid(cfg);
  const dot = document.getElementById(`dot-${id}`);
  const met = document.getElementById(`meta-${id}`);
  try {
    if (!stationIds[cfg.alternativeName]) await chargerIndexIWLS();
    const sid = stationIds[cfg.alternativeName];
    if (!sid) throw new Error('Station introuvable');
    if (met) met.textContent = `ID ${sid}`;
    const vals = await Promise.all(cfg.series.map(c => fetchIWLS(sid, c)));
    const grid = document.getElementById(`grid-${id}`);
    grid.innerHTML = cfg.series.map((c, i) => {
      const m = SERIES_META[c] || { label: c, unit: '', cls: '' };
      const pt = vals[i];
      return `<div class="data-cell">${cellHTML(
        m.label,
        pt?.value != null ? parseFloat(pt.value).toFixed(2) : null,
        m.unit, m.cls,
        pt?.eventDate ? fmt(pt.eventDate) : '—'
      )}</div>`;
    }).join('');
    if (dot) dot.className = 'status-dot ok';
  } catch (err) {
    if (dot) dot.className = 'status-dot err';
    const g = document.getElementById(`grid-${id}`);
    if (g) g.innerHTML = `<div class="error-msg">Erreur : ${err.message}</div>`;
  }
}

// ══════════════════════════════════════════════════════
//  MÉTÉO EC — Observations
// ══════════════════════════════════════════════════════
function creerCarteObs() {
  const el = document.createElement('div');
  el.className = 'station-card'; el.id = 'card-obs';
  el.innerHTML = `
    <div class="station-header">
      <div>
        <div class="station-name">Observations actuelles</div>
        <div class="station-meta">McTavish (WTA) · Environnement Canada</div>
      </div>
      <div class="status-dot load" id="dot-obs"></div>
    </div>
    <div class="data-grid" id="grid-obs">
      ${skeletonCell('Température air')}
      ${skeletonCell('Vent moyen')}
      ${skeletonCell('Direction vent')}
      ${skeletonCell('Rafale max (1h)')}
      ${skeletonCell('Précipitations (1h)')}
      ${skeletonCell('Pression')}
    </div>`;
  return el;
}

async function chargerObs() {
  const dot = document.getElementById('dot-obs');
  try {
    const r = await fetch(EC_OBS_URL);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const p = d.features?.[0]?.properties;
    if (!p) throw new Error('Aucune donnée');

    const t   = fmt(p['date_tm-value']);
    const dir = p['avg_wnd_dir_10m_pst1mt'];
    const dirTxt = dir != null
      ? `${degToCardinal(dir)}<span class="unit"> ${dir}°</span>`
      : `<span class="cell-value na">N/D</span>`;

    document.getElementById('grid-obs').innerHTML = `
      <div class="data-cell">${cellHTML('Température air',  p['air_temp']?.toFixed(1),                 '°C',   'warm', t)}</div>
      <div class="data-cell">${cellHTML('Vent moyen',       p['avg_wnd_spd_10m_pst1mt']?.toFixed(1),   ' km/h','blue', t)}</div>
      <div class="data-cell">
        <div class="cell-label">Direction vent</div>
        <div class="cell-value">${dirTxt}</div>
        <div class="cell-time">${t}</div>
      </div>
      <div class="data-cell">${cellHTML('Rafale max (1h)',   p['max_wnd_spd_10m_pst1hr']?.toFixed(1),   ' km/h','red',  t)}</div>
      <div class="data-cell">${cellHTML('Précipitations (1h)',p['pcpn_amt_pst1hr']?.toFixed(1),         ' mm',  'blue', t)}</div>
      <div class="data-cell">${cellHTML('Pression',          p['stn_pres']?.toFixed(1),                 ' hPa', '',     t)}</div>
    `;
    if (dot) dot.className = 'status-dot ok';
  } catch (err) {
    if (dot) dot.className = 'status-dot err';
    const g = document.getElementById('grid-obs');
    if (g) g.innerHTML = `<div class="error-msg">Erreur météo : ${err.message}</div>`;
  }
}

// ══════════════════════════════════════════════════════
//  MÉTÉO EC — Prévisions
// ══════════════════════════════════════════════════════
function creerCartePrev() {
  const el = document.createElement('div');
  el.className = 'station-card'; el.id = 'card-prev';
  el.innerHTML = `
    <div class="station-header">
      <div>
        <div class="station-name">Prévisions du jour</div>
        <div class="station-meta">Environnement Canada · Montréal</div>
      </div>
      <div class="status-dot load" id="dot-prev"></div>
    </div>
    <div class="forecast-body" id="body-prev">
      <div class="skeleton" style="width:100%;height:13px;margin-bottom:10px;"></div>
      <div class="skeleton" style="width:60%;height:13px;"></div>
    </div>`;
  return el;
}

async function chargerPrev() {
  const dot  = document.getElementById('dot-prev');
  const body = document.getElementById('body-prev');
  try {
    const r = await fetch(EC_PREV_URL);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    // L'API citypage retourne plusieurs périodes — on prend les 2 premières
    const features = d.features || [];
    if (!features.length) throw new Error('Aucune prévision');

    let html = '';
    const toShow = features.slice(0, 2);

    for (const feat of toShow) {
      const p = feat.properties;
      const periode   = p['period-value'] || p['forecast_period-value'] || '—';
      const texte     = p['text_summary_fr-value'] || p['forecast_text_fr-value'] || null;
      const tmax      = p['temperature_max-value']  ?? p['air_temp_max-value']  ?? null;
      const tmin      = p['temperature_min-value']  ?? p['air_temp_min-value']  ?? null;
      const pop       = p['pop-value'] ?? null;
      const condition = p['condition-value'] || p['sky_condition-value'] || null;

      html += `<div style="margin-bottom:${toShow.length > 1 ? '16px' : '0'};">`;
      html += `<div class="forecast-period">${periode}</div>`;

      if (condition)
        html += `<div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;">${condition}</div>`;

      if (tmax != null || tmin != null || pop != null) {
        html += `<div class="forecast-temps">`;
        if (tmax != null) html += `<div><div class="cell-label">MAX</div>
          <div class="cell-value warm" style="font-size:22px;">${tmax}<span class="unit">°C</span></div></div>`;
        if (tmin != null) html += `<div><div class="cell-label">MIN</div>
          <div class="cell-value blue" style="font-size:22px;">${tmin}<span class="unit">°C</span></div></div>`;
        if (pop != null)  html += `<div><div class="cell-label">PROB. PRÉCIP.</div>
          <div class="cell-value" style="font-size:22px;">${pop}<span class="unit">%</span></div></div>`;
        html += `</div>`;
      }

      if (texte) html += `<div class="forecast-text">${texte}</div>`;
      html += `</div>`;
    }

    if (!html) html = `<div style="font-family:var(--mono);font-size:11px;color:var(--muted);">
                         Données de prévision non disponibles.</div>`;

    body.innerHTML = html;
    if (dot) dot.className = 'status-dot ok';
  } catch (err) {
    if (dot) dot.className = 'status-dot err';
    if (body) body.innerHTML = `<div class="error-msg">Erreur prévisions : ${err.message}</div>`;
  }
}

// ══════════════════════════════════════════════════════
//  RAFRAÎCHISSEMENT GLOBAL
// ══════════════════════════════════════════════════════
async function rafraichirTout() {
  if (isLoading) return;
  isLoading = true;
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading'); btn.disabled = true;
  document.querySelectorAll('.status-dot')
    .forEach(d => d.className = 'status-dot load');

  await Promise.all([
    ...STATIONS_CONFIG.map(chargerIWLS),
    chargerObs(),
    chargerPrev(),
  ]);

  btn.classList.remove('loading'); btn.disabled = false;
  isLoading = false;
  document.getElementById('last-update').textContent =
    'Mis à jour : ' + new Date().toLocaleTimeString('fr-CA',
      { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
(function init() {
  for (const cfg of STATIONS_CONFIG)
    document.getElementById('group-iwls').appendChild(creerCarteIWLS(cfg));
  document.getElementById('group-meteo').appendChild(creerCarteObs());
  document.getElementById('group-prev').appendChild(creerCartePrev());
  rafraichirTout();
})();
</script>
</body>
</html>
